<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}Ecommerce site{% endblock %}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    </head>
    <body>
        
            <header>
                <nav class="navbar navbar-expand-md navbar-light fixed-top bg-light">
                    <div class="container-fluid justify-context-between">
                      <a class="navbar-brand" href="#">My Commerce</a>
                      <button class="navbar-toggler collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse" aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                      </button>
                      <div class="navbar-collapse collapse" id="navbarCollapse" style="">
                        <ul class="navbar-nav me-auto mb-2 mb-md-0">
                            <li class="nav-item"><a href="/" class="nav-link active" aria-current="page">Home</a></li>
                            <li class="nav-item"><a href="#" class="nav-link active">Categories</a></li>
                            <li class="nav-item"><a href="#" class="nav-link active">Cart</a></li>
                        </ul>
                    </div>
                  </nav>
            </header>
        </div>
        <article class="container">
            <div class="p-5 mb-4 bg-light rounded-3">
                <div class="container-fluid py-5">
                    <h1 class="display-5 fw-bold">🛒 Ecommerce</h1>
                    <p class="col-md-8 fs-4">This Ecommerce application was created during online sessions</p>
                    <button class="btn btn-primary btn-lg" type="button">Check out the Products</button>
                </div>
            </div>
            {% block content %}
                <!--All the contents from the other templates goes here-->
            {% endblock %}    
        </article>
    
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
    </body>
</html>
