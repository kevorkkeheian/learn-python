{% extends 'base.html' %}





{% block title %}
Home
{% endblock %}


{% block content %}
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
      
      {% for product in products %}
        <div class="col">

          <div class="card shadow-sm">
          <img src="{{ product.image }}" style="max-width:300px; max-height:450px"/>
          <div class="card-body">
              <h5>{{ product.no }}</h5>
              <p class="card-text">{{ product.brand }} {{ product.description }} {{ product.size }}</p>
              <div class="d-flex justify-content-between align-items-center">

              <div class="btn-group">
                
                <button type="button" class="btn btn-sm btn-outline-secondary">View</button>
                <a type="button" class="btn btn-sm btn-outline-secondary" href="/cart/add/{{ product.id }}/">Add to Cart</a>
              </div>
              <small class="text-muted">9 mins</small>
            </div>
          </div>
          </div>
        </div>
        {% endfor %}
    </div>
    

{% endblock %}
